# Mectov Linux - Starship Prompt Configuration
# CachyOS-inspired Emerald/Teal theme

format = """
[╭─](bold #1dc7b5)$os$username$hostname$directory$git_branch$git_status$cmd_duration
[╰─](bold #1dc7b5)$character"""

[os]
disabled = false
format = "[$symbol ]($style)"
style = "bold #1dc7b5"

[os.symbols]
Arch = "󰣇"
Linux = "🐧"

[username]
show_always = true
format = "[  $user]($style)"
style_user = "bold #89ddff"
style_root = "bold #f7768e"

[hostname]
ssh_only = false
format = "[@$hostname]($style) "
style = "bold #89ddff"

[directory]
format = "[ $path]($style)[$read_only]($read_only_style) "
style = "bold #e1e6f0"
read_only = " 󰌾"
read_only_style = "#f7768e"
truncation_length = 3
truncate_to_repo = true

[git_branch]
format = "[ $symbol$branch(:$remote_branch)]($style) "
symbol = " "
style = "bold #1dc7b5"

[git_status]
format = "[$all_status$ahead_behind]($style)"
style = "bold #ff9e64"

[cmd_duration]
format = "[ 󱎫 $duration]($style)"
style = "bold #565f89"
min_time = 2_000

[character]
success_symbol = "[❯](bold #1dc7b5)"
error_symbol = "[❯](bold #f7768e)"
