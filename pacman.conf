#
# Mectov Linux - pacman.conf
#

[options]
HoldPkg     = pacman glibc
Architecture = auto
CheckSpace
ParallelDownloads = 5
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

[cachyos]
SigLevel = Never
Server = https://mirror.cachyos.org/repo/$arch

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist

[endeavouros]
SigLevel = Never
Server = https://mirror.alpix.eu/endeavouros/repo/endeavouros/$arch
